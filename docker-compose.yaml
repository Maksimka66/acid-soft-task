services:
    db_postgres:
      container_name: acid_db
      image: postgres:16.0
      restart: always
      env_file:
        - path: ./backend/.env
      environment:
        POSTGRES_USER: ${DB_USERNAME}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_NAME}
      ports:
        - ${DB_PORT}:5432
      volumes:
      - pg-data:/var/lib/postgresql/data

    redis:
      image: "redis:latest"
      container_name: "acid_cache"
      environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_USER=${REDIS_USER}
      - REDIS_USER_PASSWORD=${REDIS_USER_PASSWORD}
      ports:
        - "6380:6379"

volumes:
  pg-data:
